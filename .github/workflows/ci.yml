# Continuous Integration
# Runs on every push/PR targeting dev or main.
# Lint and type-check warn but don't block; tests and build are mandatory.
name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Lint, Type-check, Test & Build
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: "postgresql://ci:ci@localhost:5432/ci_db"
      NEXTAUTH_SECRET: "ci-secret-for-testing-only-32-chars-min"
      NEXTAUTH_URL: "http://localhost:3000"
      NEXT_PUBLIC_APP_URL: "http://localhost:3000"
      SKIP_ENV_VALIDATION: "true"

    strategy:
      fail-fast: false
      matrix:
        node-version: [20.x, 22.x]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm db:generate

      # Lint and type-check: informational on dev, blocking on main
      - name: Run lint
        run: pnpm lint
        continue-on-error: ${{ github.base_ref != 'main' && github.ref_name != 'main' }}

      - name: Run type check
        run: pnpm type-check
        continue-on-error: ${{ github.base_ref != 'main' && github.ref_name != 'main' }}

      # Tests and build: always blocking
      - name: Run tests
        run: pnpm test --run

      - name: Build
        run: pnpm build
