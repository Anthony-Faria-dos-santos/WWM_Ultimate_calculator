# Release Gate
# Extra checks that run ONLY on PRs from dev → main.
# Ensures production-readiness before merging to main.
name: Release Gate

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: release-gate-${{ github.head_ref }}
  cancel-in-progress: true

jobs:
  release-checks:
    name: Production Readiness
    runs-on: ubuntu-latest
    # Only run when the source branch is dev
    if: github.head_ref == 'dev'

    env:
      DATABASE_URL: "postgresql://ci:ci@localhost:5432/ci_db"
      NEXTAUTH_SECRET: "ci-secret-for-testing-only-32-chars-min"
      NEXTAUTH_URL: "http://localhost:3000"
      NEXT_PUBLIC_APP_URL: "http://localhost:3000"
      SKIP_ENV_VALIDATION: "true"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node.js 22.x
        uses: actions/setup-node@v6
        with:
          node-version: 22.x
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm db:generate

      # All checks are BLOCKING for production
      - name: Run lint (strict)
        run: pnpm lint

      - name: Run type check (strict)
        run: pnpm type-check

      - name: Run tests
        run: pnpm test --run

      - name: Build
        run: pnpm build

      - name: Security audit
        run: pnpm audit --prod --audit-level=high
        continue-on-error: true

      - name: Check for outdated dependencies
        run: pnpm outdated || true
