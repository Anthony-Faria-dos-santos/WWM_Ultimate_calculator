version: 2
updates:
  # npm / pnpm dependencies are managed by Renovate Bot
  # See renovate.json for configuration

  # GitHub Actions — kept under Dependabot for security alerts
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Europe/Paris"
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "ci"
