name: Bug Report
description: Report a bug or incorrect calculation
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug!
        Please fill out the form below as completely as possible.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug.
      placeholder: Describe what happened...
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Step-by-step instructions to reproduce the issue.
      placeholder: |
        1. Go to...
        2. Select weapon...
        3. See incorrect result...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What actually happened?
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: |
        Screenshots, videos, formula references, patch notes, or any other relevant information.
      placeholder: Paste screenshots, links, or community research here...

  - type: input
    id: environment
    attributes:
      label: Environment
      description: Browser, OS and project version or commit hash.
      placeholder: "e.g. Chrome 122, Windows 11, commit abc1234"
    validations:
      required: true
